name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      # Fail only on high+; see docs/ci-and-git-hooks.md to tighten or add --production.
      - run: npm audit --audit-level=high
      # format, lint, test+coverage, typecheck:frontend, build, openapi:check
      - run: npm run check
