services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      MONGODB_URI: mongodb://mongo:27017/ecommerce
      LOG_LEVEL: info
    depends_on:
      - mongo

volumes:
  mongo_data:
